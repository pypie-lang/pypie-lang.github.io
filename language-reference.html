<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPie - Language Reference</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap");

        body {
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            margin: 0;
            background-color: var(--hero-bg);
            color: var(--hero-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        :root {
            --hero-bg: #343a40;
            --hero-text: #ffffff;
            --top-bar-bg: #212529;
            --btn-text: #f8f9fa;
            --btn-border: #f8f9fa;
            --theme-toggle-bg: #fdf6e3;
        }
        body.theme-solaris {
            --hero-bg: #eee8d5;
            --hero-text: #073642;
            --top-bar-bg: #e7ddc7;
            --btn-text: #586e75;
            --btn-border: #93a1a1;
            --theme-toggle-bg: #343a40;
        }
        .top-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: clamp(0.5rem, 2vh, 1rem) 2rem;
            background-color: var(--top-bar-bg);
            position: relative;
        }
        .top-actions .btn {
            color: var(--btn-text);
            text-decoration: none;
            border: 1px solid var(--btn-border);
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600;
            background: transparent;
            cursor: pointer;
            font: inherit;
        }
        .theme-toggle {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid var(--btn-border);
            background: var(--theme-toggle-bg);
            cursor: pointer;
        }
        .theme-toggle:focus-visible {
            outline: 2px solid var(--btn-text);
            outline-offset: 2px;
        }
        .page {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(2rem, 6vw, 4.5rem) 2rem;
        }
        .page h1 {
            font-size: clamp(2.25rem, 6vw, 3.5rem);
            margin-bottom: 1rem;
        }
        .page p {
            font-size: clamp(1.1rem, 2.4vw, 1.5rem);
            max-width: 720px;
            margin: 0 auto;
        }
        .page .btn {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--btn-text);
            text-decoration: none;
            border: 1px solid var(--btn-border);
            padding: 0.7rem 1.2rem;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body class="theme-dark">
    <div data-top-actions></div>
    <main class="page">
        <div>
            <h1>Language Reference</h1>
            <p>The language reference now lives in the chapter-based manual. Start with the guide, then expand chapter by chapter as the reference grows.</p>
            <a class="btn" href="manual/guide/index.html">Open The PyPie Guide</a>
        </div>
    </main>
    <script src="top-actions.js"></script>
</body>
</html>
