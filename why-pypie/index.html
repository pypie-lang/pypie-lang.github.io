<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPie - Why PyPie?</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap");

        body {
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            margin: 0;
            background-color: var(--hero-bg);
            color: var(--hero-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        :root {
            --hero-bg: #343a40;
            --hero-text: #ffffff;
            --top-bar-bg: #212529;
            --btn-text: #f8f9fa;
            --btn-border: #f8f9fa;
            --theme-toggle-bg: #fdf6e3;
            --panel-bg: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.14);
            --muted-text: rgba(248, 249, 250, 0.72);
            --link-color: #9ddcff;
            --section-bg: rgba(255, 255, 255, 0.04);
            --inline-code-bg: rgba(0, 0, 0, 0.32);
            --inline-code-border: rgba(255, 255, 255, 0.18);
            --code-bg: rgba(0, 0, 0, 0.35);
            --code-border: rgba(255, 255, 255, 0.2);
            --code-base: rgba(255, 255, 255, 0.88);
            --code-kw: rgba(255, 219, 92, 0.9);
            --code-fn: rgba(138, 235, 255, 0.9);
            --code-type: rgba(255, 167, 227, 0.9);
            --code-num: rgba(190, 255, 151, 0.9);
            --code-op: rgba(255, 255, 255, 0.85);
            --tooltip-bg: rgba(12, 12, 12, 0.9);
            --tooltip-text: #f8f9fa;
            --tooltip-border: rgba(255, 255, 255, 0.2);
        }
        body.theme-solaris {
            --hero-bg: #eee8d5;
            --hero-text: #073642;
            --top-bar-bg: #e7ddc7;
            --btn-text: #586e75;
            --btn-border: #93a1a1;
            --theme-toggle-bg: #343a40;
            --panel-bg: rgba(253, 246, 227, 0.75);
            --panel-border: rgba(147, 161, 161, 0.5);
            --muted-text: rgba(88, 110, 117, 0.78);
            --link-color: #268bd2;
            --section-bg: rgba(253, 246, 227, 0.55);
            --inline-code-bg: rgba(7, 54, 66, 0.08);
            --inline-code-border: rgba(147, 161, 161, 0.45);
            --code-bg: rgba(253, 246, 227, 0.9);
            --code-border: rgba(147, 161, 161, 0.5);
            --code-base: rgba(88, 110, 117, 0.95);
            --code-kw: rgba(181, 137, 0, 0.95);
            --code-fn: rgba(42, 161, 152, 0.95);
            --code-type: rgba(108, 113, 196, 0.95);
            --code-num: rgba(133, 153, 0, 0.95);
            --code-op: rgba(88, 110, 117, 0.9);
            --tooltip-bg: rgba(253, 246, 227, 0.95);
            --tooltip-text: #586e75;
            --tooltip-border: rgba(147, 161, 161, 0.5);
        }
        .top-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: clamp(0.5rem, 2vh, 1rem) 2rem;
            background-color: var(--top-bar-bg);
            position: relative;
        }
        .top-actions .btn {
            color: var(--btn-text);
            text-decoration: none;
            border: 1px solid var(--btn-border);
            padding: 0.5rem 1.25rem;
            border-radius: 4px;
            font-weight: 600;
            background: transparent;
            cursor: pointer;
            font: inherit;
        }
        .theme-toggle {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid var(--btn-border);
            background: var(--theme-toggle-bg);
            cursor: pointer;
        }
        .theme-toggle:focus-visible {
            outline: 2px solid var(--btn-text);
            outline-offset: 2px;
        }
        .doc-shell {
            display: grid;
            grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
            gap: clamp(1.5rem, 4vw, 3rem);
            padding: clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 6vw, 4.5rem) 3.5rem;
        }
        .doc-nav {
            position: sticky;
            top: 1.5rem;
            align-self: start;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-left: -0.75rem;
        }
        .doc-nav__title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted-text);
            margin-bottom: 1rem;
        }
        .doc-nav a {
            display: block;
            color: var(--hero-text);
            text-decoration: none;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        .doc-nav a:hover {
            color: var(--link-color);
        }
        .doc-nav a[aria-current="page"] {
            color: var(--link-color);
        }
        .doc-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
            gap: clamp(1rem, 3vw, 1.75rem);
            align-items: start;
        }
        .doc-content {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: clamp(1.75rem, 4vw, 3rem);
            line-height: 1.65;
        }
        .doc-eyebrow {
            margin: 0;
            color: var(--muted-text);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .doc-lead {
            font-size: clamp(1.02rem, 2vw, 1.28rem);
            margin: 0;
            white-space: pre-line;
        }
        .manual-intro {
            margin-top: 1.5rem;
        }
        .manual-intro:empty {
            display: none;
        }
        .manual-sections {
            display: flex;
            flex-direction: column;
            gap: clamp(1.75rem, 4vw, 2.4rem);
            margin-top: clamp(2rem, 5vw, 3rem);
        }
        .manual-section {
            scroll-margin-top: 1.5rem;
            border-top: 1px solid var(--panel-border);
            padding-top: clamp(1.35rem, 3vw, 1.8rem);
        }
        .manual-section:first-child {
            border-top: 0;
            padding-top: 0;
        }
        .manual-section__eyebrow {
            margin: 0 0 0.35rem;
            font-size: 0.74rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-text);
        }
        .manual-section h2 {
            font-size: clamp(0.95rem, 1.6vw, 1.1rem);
            margin: 0 0 0.75rem;
        }
        .manual-prose {
            margin: 0;
        }
        .manual-prose + .manual-prose {
            margin-top: 0.8rem;
        }
        .manual-link {
            color: var(--link-color);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .manual-link:focus-visible {
            outline: 1px solid var(--btn-border);
            outline-offset: 2px;
            border-radius: 2px;
        }
        .doc-lead code,
        .manual-prose code {
            font-family: "IBM Plex Mono", "Courier New", monospace;
            font-size: 0.9em;
            white-space: nowrap;
            word-break: normal;
            overflow-wrap: normal;
            background: var(--inline-code-bg);
            border: 1px solid var(--inline-code-border);
            border-radius: 4px;
            padding: 0.1rem 0.35rem;
        }
        .manual-section .doc-code,
        .manual-fenced-code {
            margin-top: 1rem;
        }
        .manual-fenced-code code {
            font: inherit;
            color: inherit;
        }
        .keyword-panel {
            background: var(--section-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 0.9rem 1rem;
        }
        .doc-keywords {
            align-self: start;
            position: sticky;
            top: 1.5rem;
        }
        .keyword-panel__title {
            margin: 0 0 0.55rem;
            font-size: 0.74rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-text);
        }
        .keyword-panel__list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.38rem;
        }
        .keyword-panel__item {
            font-family: "IBM Plex Mono", "Courier New", monospace;
            font-size: 0.88rem;
        }
        .keyword-panel__item--empty {
            color: var(--muted-text);
            font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
            font-size: 0.88rem;
        }
        .keyword-panel__link {
            color: inherit;
            text-decoration: none;
        }
        .keyword-panel__link:hover {
            text-decoration: underline;
        }
        .keyword-panel__link:focus-visible {
            outline: 1px solid var(--btn-border);
            outline-offset: 2px;
            border-radius: 3px;
        }
        .keyword-panel__item code {
            font: inherit;
            color: inherit;
            background: transparent;
            border: 0;
            padding: 0;
        }
        .doc-code {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            font-family: "IBM Plex Mono", "Courier New", monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--code-base);
            white-space: pre;
        }
        .doc-code .kw {
            color: var(--code-kw);
        }
        .doc-code .fn {
            color: var(--code-fn);
        }
        .doc-code .type {
            color: var(--code-type);
        }
        .doc-code .num {
            color: var(--code-num);
        }
        .doc-code .op {
            color: var(--code-op);
        }
        .code-type-tooltip {
            position: fixed;
            left: 0;
            top: 0;
            transform: translate(-50%, -130%);
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            font-family: "IBM Plex Mono", "Courier New", monospace;
            font-size: 0.9rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--tooltip-border);
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            transition: opacity 120ms ease;
        }
        @media (max-width: 900px) {
            .doc-shell {
                grid-template-columns: 1fr;
            }
            .doc-nav {
                position: static;
                margin-left: 0;
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem 1rem;
            }
            .doc-nav a {
                margin-bottom: 0;
            }
            .doc-main {
                grid-template-columns: 1fr;
            }
            .doc-keywords {
                position: static;
            }
        }
    </style>
</head>
<body class="theme-dark" data-manual-page="why-pypie">
    <div data-top-actions></div>
    <div class="doc-shell">
        <aside class="doc-nav" data-manual-nav></aside>
        <div class="doc-main">
            <article class="doc-content" data-code-surface>
                <header class="doc-header">
                    <p class="doc-eyebrow" data-manual-eyebrow></p>
                    <p class="doc-lead" data-manual-lead></p>
                </header>
                <div class="manual-intro" data-manual-intro></div>
                <div class="manual-sections" data-manual-sections></div>
            </article>
            <aside class="keyword-panel doc-keywords" aria-label="Manual keywords">
                <h3 class="keyword-panel__title">Keywords</h3>
                <ul class="keyword-panel__list" data-manual-keywords></ul>
            </aside>
        </div>
    </div>
    <div class="code-type-tooltip" aria-hidden="true"></div>
    <script src="../top-actions.js"></script>
    <script src="../code-types.js"></script>
    <script src="../manual/manual-shared.js"></script>

    <script src="main.js"></script>
</body>
</html>
